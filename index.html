<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00b4d8">
    <link rel="manifest" href="manifest.json">
    <title>787 Perf Tool Pro</title>
    <style>
        :root {
            --bg-black: #0a0a0a; --card-bg: #121212; --border-color: #333;
            --accent-cyan: #00b4d8; --value-green: #00ff41; --text-grey: #a0a0a0;
            --btn-active: #004d4d; --caution-red: #ff4d4d;
            --alert-bg: #441111; --alert-text: #ff9999;
        }
        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-container { display: flex; gap: 12px; width: 100%; max-width: 1150px; }
        @media (max-width: 700px) { .main-container { flex-direction: column; align-items: center; } }

        .panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; flex: 1; min-width: 0; box-sizing: border-box; }
        h2 { color: var(--accent-cyan); font-size: 13px; margin: 0 0 12px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; text-transform: uppercase; }

        .input-row-container { display: flex; flex-direction: column; gap: 8px; }
        .input-pair-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; height: 40px; }

        .left-item, .right-item { display: flex; align-items: center; gap: 10px; flex: 1; }
        .left-item { justify-content: flex-end; }
        .right-item { justify-content: flex-start; }

        .left-item label { width: 60px; text-align: right; color: var(--text-grey); font-size: 11px; font-weight: bold; }
        .right-item label { width: 80px; text-align: left; color: var(--text-grey); font-size: 11px; font-weight: bold; }

        .input-box { background: #1a1a1a; border: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; border-radius: 4px; width: 140px; height: 36px; overflow: hidden; gap: 4px; padding: 3px; box-sizing: border-box; }
        .wide-box { width: 200px; }
        .input-box button { background: #2a2a2a; border: none; color: white; width: 30px; height: 100%; cursor: pointer; font-size: 16px; border-radius: 3px; flex-shrink: 0; }
        .input-box .val { color: var(--value-green); font-weight: bold; font-family: 'Consolas', monospace; font-size: 18px; flex: 1; text-align: center; }

        .segment { display: flex; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; width: 140px; height: 36px; }
        .segment div { flex: 1; text-align: center; line-height: 36px; background: #1a1a1a; cursor: pointer; font-size: 12px; font-weight: bold; }
        .segment div.active { box-shadow: inset 0 0 0 2px var(--accent-cyan); color: var(--value-green); background: var(--btn-active); }

        /* QNH単位ボタン */
        .unit-btn { background: #2a2a2a; border: 1px solid var(--border-color); color: var(--text-grey); border-radius: 4px; padding: 0 8px; height: 36px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .unit-btn.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: var(--btn-active); }

        /* カスタムドロップダウン */
        .custom-select-wrapper { position: relative; width: 140px; height: 36px; }
        .custom-select-trigger {
            background: #1a1a1a; border: 1px solid var(--border-color);
            border-radius: 4px; width: 100%; height: 36px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 8px; box-sizing: border-box;
            cursor: pointer; font-weight: bold; font-size: 16px; font-family: 'Consolas', monospace;
        }
        .custom-select-trigger .arrow { color: var(--text-grey); font-size: 10px; margin-left: 4px; }
        .custom-select-dropdown {
            display: none; position: fixed; z-index: 9999;
            background: #1a1a1a; border: 1px solid var(--accent-cyan);
            border-radius: 6px; overflow-y: auto; max-height: 60vh;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            min-width: 140px;
        }
        .custom-select-dropdown.open { display: block; }
        .custom-select-option { padding: 10px 14px; cursor: pointer; font-size: 15px; font-weight: bold; font-family: 'Consolas', monospace; border-bottom: 1px solid #222; }
        .custom-select-option:hover { background: #2a2a2a; }
        .custom-select-option.selected { background: var(--btn-active); }
        .custom-select-separator { padding: 6px 10px; font-size: 10px; color: #555; background: #111; border-bottom: 1px solid #222; pointer-events: none; letter-spacing: 1px; }

        .col-jp  { color: #adff2f; } .col-kr { color: #00ff7f; } .col-tw { color: #ffa500; }
        .col-cn  { color: #ff4d4d; } .col-sea { color: #ffa500; } .col-us { color: #00b4d8; }

        select { background: #1a1a1a; color: var(--value-green); border: 1px solid var(--border-color); width: 140px; height: 36px; font-weight: bold; border-radius: 4px; font-size: 16px; padding: 0 5px; }

        /* Results */
        .res-box { border: 2px solid var(--accent-cyan); padding: 12px; border-radius: 4px; margin-bottom: 12px; background: rgba(0, 180, 216, 0.1); }
        .res-row { display: flex; justify-content: space-between; align-items: baseline; }
        .res-val { font-size: 38px; font-weight: bold; font-family: 'Consolas', monospace; color: #ffff00; }
        .res-unit { font-size: 14px; color: white; margin-left: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--accent-cyan); padding: 5px 2px; border-bottom: 1px solid var(--accent-cyan); font-size: 10px; }
        td { padding: 10px 2px; border-bottom: 1px solid #222; color: #fff; font-size: 18px; font-family: 'Consolas', monospace; }
        .active-row td { background: #112211; }
        .active-row td:first-child { color: var(--value-green) !important; font-weight: bold; }

        .alert-cell { background-color: var(--alert-bg) !important; color: var(--alert-text) !important; }
        .twy-header { background: #1a1a1a; color: var(--accent-cyan); font-size: 10px; text-align: center; font-weight: bold; padding: 5px 0; }
        .twy-hi { color: var(--accent-cyan); } .twy-norm { color: var(--caution-red); }
        .bt-safe { color: var(--value-green); } .bt-caution { color: var(--caution-red); font-weight: bold; }
        .weather-info { font-size: 10px; color: var(--accent-cyan); font-style: italic; text-align: center; margin-bottom: 10px; }
    </style>
</head>

                <div class="right-item"></div>
            </div>
            <div class="input-pair-row">

                <div class="right-item">
                    <div class="input-box"><button onclick="step('brks', -1)">-</button><div class="val" id="brks-val">3</div><button onclick="step('brks', 1)">+</button></div>
                    <label>BRKS</label>
                </div>
            </div>
            <div class="input-pair-row">
                <div class="left-item"><label>OAT</label><div class="input-box wide-box"><button onclick="step('oat', -10)">&lt;</button><button onclick="step('oat', -1)">-</button><div class="val" id="oat-val">15</div><button onclick="step('oat', 1)">+</button><button onclick="step('oat', 10)">&gt;</button></div></div>
                <div class="right-item"></div>
            </div>
            <div class="input-pair-row">
                <div class="left-item">
                    <label>QNH</label>
                    <div class="input-box wide-box">
                        <button onclick="step('qnh', -10)">&lt;</button><button onclick="step('qnh', -1)">-</button>
                        <div class="val" id="qnh-val">29.92</div>
                        <button onclick="step('qnh', 1)">+</button><button onclick="step('qnh', 10)">&gt;</button>
                    </div>
                </div>
                <div class="right-item">
                    <!-- QNH単位切替ボタン -->
                    <button class="unit-btn active" id="btn-inhg" onclick="setQnhUnit('inHg')">inHg</button>
                    <button class="unit-btn" id="btn-hpa" onclick="setQnhUnit('hPa')">hPa</button>
                </div>
            </div>
            <div class="input-pair-row">
                <div class="left-item">
                    <label>WEIGHT</label>
                    <div class="input-box wide-box">
                        <button onclick="step('wgt', -10)">&lt;</button><button onclick="step('wgt', -1)">-</button>
                        <div class="val" id="wgt-val">320T</div>
                        <button onclick="step('wgt', 1)">+</button><button onclick="step('wgt', 10)">&gt;</button>
                    </div>
                </div>
                <div class="right-item">
                    <select id="rev-select" onchange="updateDisplay()"><option value="MAX">MAX REV</option><option value="ONE">ONE REV</option><option value="NO">NO REV</option></select>
                    <label>REV</label>
                </div>
            </div>
            <div class="input-pair-row">
                <div class="left-item">
                    <label>VREF ADD</label>
                    <div class="input-box"><button onclick="step('vref', -1)">-</button><div class="val" id="vref-val">5</div><button onclick="step('vref', 1)">+</button></div>
                </div>
                <div class="right-item"></div>
            </div>
        </div>
    </div>

    <!-- RESULTS -->
    <div class="panel" style="max-width: 500px;">
        <h2>Results</h2>
        <div class="res-box">
            <div class="res-row">

            <tbody id="ldg-body"></tbody>
        </table>
    </div>
</div>

// --- 国別カラー ---
function getColorClass(c) {
    if (c === 'JP') return 'col-jp';
    if (c === 'KR') return 'col-kr';
    if (c === 'TW') return 'col-tw';
    if (c === 'CN' || c === 'HK') return 'col-cn';
    if (c === 'US') return 'col-us';
    return 'col-sea';
}

// --- 状態管理 ---
// qnhUnit: 'inHg' or 'hPa' を手動で管理（空港に依存しない）
let state = { model:'787-8', flap:25, brksIdx:2, cond:6, wind:0, oat:15, qnh:29.92, qnhUnit:'inHg', vref:5, apt:'HND', rwy:'34L', wgt:320000 };
let weatherCache = {};

// --- QNH単位切替 ---
function setQnhUnit(unit) {
    const oldUnit = state.qnhUnit;
    if (oldUnit === unit) return;
    // 現在の値を変換してから単位変更
    if (unit === 'hPa') {
        state.qnh = Math.round(state.qnh / 0.02953);
    } else {
        state.qnh = parseFloat((state.qnh * 0.02953).toFixed(2));
    }
    state.qnhUnit = unit;
    document.getElementById('btn-inhg').classList.toggle('active', unit === 'inHg');
    document.getElementById('btn-hpa').classList.toggle('active', unit === 'hPa');
    updateDisplay();
}

function isinHg() { return state.qnhUnit === 'inHg'; }

// --- カスタムドロップダウン ---
function buildAptDropdown() {
    const dropdown = document.getElementById('apt-dropdown');
    dropdown.innerHTML = '';
    let currentReg = '';
    Object.keys(airportData).forEach(icao => {
        const data = airportData[icao];
        if (data.reg !== currentReg) {
            currentReg = data.reg;
            const sep = document.createElement('div');
            sep.className = 'custom-select-separator';
            sep.innerText = `── ${currentReg} ──`;
            dropdown.appendChild(sep);
        }
        const opt = document.createElement('div');
        opt.className = `custom-select-option ${getColorClass(data.c)}`;
        opt.dataset.value = icao;
        opt.innerText = icao;
        opt.onclick = (e) => { e.stopPropagation(); selectApt(icao); };
        dropdown.appendChild(opt);
    });
}

function toggleAptDropdown(e) {
    e.stopPropagation();
    const dropdown = document.getElementById('apt-dropdown');
    const trigger = document.getElementById('apt-trigger');
    const isOpen = dropdown.classList.contains('open');
    closeAptDropdown();
    if (!isOpen) {
        const rect = trigger.getBoundingClientRect();
        dropdown.style.top = (rect.bottom + 4) + 'px';
        dropdown.style.left = rect.left + 'px';
        dropdown.style.width = Math.max(rect.width, 140) + 'px';
        dropdown.classList.add('open');
    }
}

function closeAptDropdown() {
    document.getElementById('apt-dropdown').classList.remove('open');
}

function selectApt(icao) {
    state.apt = icao;
    const colorClass = getColorClass(airportData[icao].c);
    const triggerText = document.getElementById('apt-trigger-text');
    triggerText.className = colorClass;
    triggerText.innerText = icao;
    document.querySelectorAll('.custom-select-option').forEach(el => {
        el.classList.toggle('selected', el.dataset.value === icao);
    });
    closeAptDropdown();
    onAirportChange(false);
}

document.addEventListener('click', closeAptDropdown);

    const savedWeather = localStorage.getItem('weather_cache_v1');
    if (savedWeather) { try { weatherCache = JSON.parse(savedWeather); } catch(e) {} }

    const saved = localStorage.getItem('perf_state_v52');
    if (saved) {

        } catch(e) {}

    document.getElementById('btn-inhg').classList.toggle('active', state.qnhUnit === 'inHg');
    document.getElementById('btn-hpa').classList.toggle('active', state.qnhUnit === 'hPa');
    selectApt(state.apt);
    onAirportChange(true);
}

function inferValue(dataPoint, abNum) {
    if (dataPoint[abNum] !== undefined) return dataPoint[abNum];
    const keys = Object.keys(dataPoint).map(Number).sort((a,b) => a-b);
    if (abNum < keys[0]) return 40.0;
    return "Ctn";
}

function getBrakeTempLimit(distKey, abNum) {
    const dataArray = brakeTempData[state.model][state.flap];
    if (!dataArray) return "-";
    const targetW = state.wgt / 1000;
    const maxW = dataArray[0].w;
    const minW = dataArray[dataArray.length-1].w;
    if (targetW > maxW) return "-";
    if (targetW <= minW) return 40.0;
    let upper = dataArray.find((d, i) => d.w >= targetW && dataArray[i+1]?.w < targetW) || dataArray[0];
    let lower = dataArray[dataArray.indexOf(upper) + 1] || upper;
    const vU = inferValue(upper[distKey], abNum);
    const vL = inferValue(lower[distKey], abNum);
    if (vU === "Ctn" || vL === "Ctn") return "Ctn";
    if (upper === lower) return vU;
    return vL + (vU - vL) * (targetW - lower.w) / (upper.w - lower.w);
}

function formatBrakeTemp(limit) {
    if (limit === "-") return "-";
    if (limit === "Ctn") return '<span class="bt-caution">CTN</span>';
    const isCaution = state.oat > limit;
    const displayVal = limit >= 40.0 ? "40.0" : limit.toFixed(1);
    return `<span class="${isCaution ? 'bt-caution' : 'bt-safe'}">${displayVal}</span>`;
}

function calculateAll() {
    const n1Base = { "787-8": { 25: {260:38.2, 380:45.5}, 30: {260:42.1, 380:49.7} }, "787-9": { 25: {300:40.3, 420:47.4}, 30: {300:45.2, 420:52.7} } };
    const tableN1 = n1Base[state.model][state.flap];
    const wLbs = state.wgt / 1000;
    const rStart = state.model === '787-8' ? 260 : 300;
    const baseN1 = tableN1[rStart] + (tableN1[state.model==='787-8'?380:420] - tableN1[rStart]) * ((wLbs - rStart) / 120);
    const n1 = baseN1 + (state.oat-15)/10 + (state.wind>0?state.wind/10*1.5:0) + (state.vref-5)/5*1.5;
    document.getElementById('res-n1').innerText = n1.toFixed(1);

    const tbody = document.getElementById('ldg-body');
    tbody.innerHTML = '';
    const labels = ["1","2","3","4","MAX AUTO"];
    const aomOrder = [4,3,2,1,0];
    const modelFlapData = ldgPerf[state.model][state.flap] || ldgPerf["787-8"][30];
    const condTable = modelFlapData[state.cond] || modelFlapData[6] || modelFlapData[5];
    const refW = ldgPerf[state.model]?.refWgt || 380000;

    const ab3_data = condTable[aomOrder[2]] || condTable[0];
    let ab3_dist = ab3_data.ref + ((state.wgt - refW) / 10000) * (state.wgt > refW ? ab3_data.wt[0] : Math.abs(ab3_data.wt[1]));
    ab3_dist += (state.wind >= 0 ? (state.wind/10)*ab3_data.wind[0] : (Math.abs(state.wind)/10)*ab3_data.wind[1]);
    ab3_dist += (state.vref / 5) * ab3_data.vref;
    if(ab3_data.temp) ab3_dist += ((state.oat-15)/10) * (state.oat > 15 ? ab3_data.temp[0] : ab3_data.temp[1]);
    const revMode = document.getElementById('rev-select').value;
    if(revMode === 'ONE') ab3_dist += ab3_data.rev[0]; else if(revMode === 'NO') ab3_dist += ab3_data.rev[1];

    const currentTwys = twyData[state.apt] ? twyData[state.apt][state.rwy] : null;
    const maxTwyDist = currentTwys ? Math.max(...currentTwys.map(t => t.d)) : 0;

    labels.forEach((name, i) => {
        const d = condTable[aomOrder[i]] || condTable[0];
        let dist = d.ref;
        const wDiff = (state.wgt - refW) / 10000;
        dist += wDiff * (wDiff > 0 ? d.wt[0] : Math.abs(d.wt[1]));
        dist += (state.wind >= 0 ? (state.wind/10)*d.wind[0] : (Math.abs(state.wind)/10)*d.wind[1]);
        dist += (state.vref / 5) * d.vref;
        if(d.temp) dist += ((state.oat-15)/10) * (state.oat > 15 ? d.temp[0] : d.temp[1]);
        if(revMode === 'ONE') dist += d.rev[0]; else if(revMode === 'NO') dist += d.rev[1];

        let temp1NM = "-", temp2NM = "-";
        if (name !== "MAX AUTO") {
            const abNum = parseInt(name);
            temp1NM = formatBrakeTemp(getBrakeTempLimit("nm1", abNum));
            temp2NM = formatBrakeTemp(getBrakeTempLimit("nm2", abNum));
        }
        const tr = document.createElement('tr');
        if(i === state.brksIdx) tr.className = 'active-row';
        const isAbTooLong = (maxTwyDist > 0 && dist > (maxTwyDist + 1000));
        tr.innerHTML = `<td>${name}</td><td class="${isAbTooLong ? 'alert-cell' : ''}">${Math.round(dist).toLocaleString()}</td><td>${temp1NM}</td><td>${temp2NM}</td>`;
        tbody.appendChild(tr);
    });

    if (currentTwys) {
        const sep = document.createElement('tr');
        sep.innerHTML = `<td colspan="4" class="twy-header">VACATE DISTANCE (FT)</td>`;
        tbody.appendChild(sep);
        currentTwys.forEach(twy => {
            const tr = document.createElement('tr');
            const isHi = hiSpdTwy.includes(twy.n);
            const isTwyTooShort = (twy.d < (ab3_dist - 1000));
            const colorClass = isTwyTooShort ? 'alert-cell' : (isHi ? 'twy-hi' : 'twy-norm');
            tr.innerHTML = `<td class="${colorClass}">${twy.n}</td><td class="${colorClass}">${twy.d.toLocaleString()}</td><td></td><td></td>`;
            tbody.appendChild(tr);
        });
    }
    saveState();
}

async function fetchAllWeather() {
    const statusEl = document.getElementById('weather-status');
    statusEl.innerText = "SYNCING WEATHER...";
    const lats = Object.values(airportData).map(a => a.lat).join(',');
    const lons = Object.values(airportData).map(a => a.lon).join(',');
    try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}&current=temperature_2m,pressure_msl`);
        const data = await response.json();
        Object.keys(airportData).forEach((icao, index) => {
            weatherCache[icao] = {
                oat: Math.round(data[index]?.current?.temperature_2m ?? 15),
                qnh: data[index]?.current?.pressure_msl ?? 1013
            };
        });
        // 天気キャッシュをlocalStorageに保存（オフライン用）
        localStorage.setItem('weather_cache_v1', JSON.stringify(weatherCache));
        statusEl.innerText = "ALL WEATHER UPDATED";
    } catch (e) {
        statusEl.innerText = weatherCache && Object.keys(weatherCache).length > 0
            ? "OFFLINE - USING CACHED WEATHER"
            : "OFFLINE - NO WEATHER DATA";
    }
    // OAT/QNHだけ更新（空港・RWY選択は保持）
    if (weatherCache[state.apt]) {
        state.oat = weatherCache[state.apt].oat;
        const hpa = weatherCache[state.apt].qnh;
        state.qnh = isinHg() ? parseFloat((hpa * 0.02953).toFixed(2)) : Math.round(hpa);
    }
    updateDisplay();
}

function onAirportChange(isLoad = false) {
    state.apt = document.getElementById('apt-trigger-text').innerText;
    const data = airportData[state.apt];
    if (weatherCache[state.apt]) {
        state.oat = weatherCache[state.apt].oat;
        const hpa = weatherCache[state.apt].qnh;
        state.qnh = isinHg() ? parseFloat((hpa * 0.02953).toFixed(2)) : Math.round(hpa);
    } else {
        state.oat = 15;
        state.qnh = isinHg() ? 29.92 : 1013;
    }
    const rwySelect = document.getElementById('rwy-select');
    rwySelect.innerHTML = '';
    Object.keys(data.r).forEach(r => { const o = document.createElement('option'); o.value=r; o.innerText=r; rwySelect.appendChild(o); });
    if (isLoad && data.r[state.rwy]) rwySelect.value = state.rwy;
    else if (state.apt === 'ITM') { rwySelect.value = '32L'; state.rwy = '32L'; }
    else { state.rwy = Object.keys(data.r)[0]; rwySelect.value = state.rwy; }
    updateDisplay();
}

function onRwyChange() { state.rwy = document.getElementById('rwy-select').value; updateDisplay(); }

function step(field, amt) {
    if (field === 'wgt') state.wgt += 1000 * amt;
    else if (field === 'qnh') {
        const stepAmt = isinHg() ? (Math.abs(amt) === 10 ? 0.1 : 0.01) : (Math.abs(amt) === 10 ? 10 : 1);
        state.qnh = parseFloat((state.qnh + (amt > 0 ? stepAmt : -stepAmt)).toFixed(2));
    }
    else if (field === 'cond') state.cond = Math.max(1, Math.min(6, state.cond + amt));
    else if (field === 'brks') state.brksIdx = Math.max(0, Math.min(4, state.brksIdx + amt));
    else if (field === 'vref') state.vref = Math.max(0, Math.min(20, state.vref + amt));
    else if (field === 'wind') state.wind += amt;
    else if (field === 'oat') state.oat += amt;
    updateDisplay();
}

function updateDisplay() {
    document.getElementById('cond-val').innerText = state.cond;
    document.getElementById('brks-val').innerText = ["1","2","3","4","MAX AUTO"][state.brksIdx];
    document.getElementById('wind-val').innerText = (state.wind >= 0 ? "H " : "T ") + Math.abs(state.wind);
    document.getElementById('oat-val').innerText = state.oat;
    document.getElementById('qnh-val').innerText = isinHg() ? state.qnh.toFixed(2) : state.qnh;
    document.getElementById('wgt-val').innerText = (state.wgt / 1000).toFixed(0) + "T";
    document.getElementById('vref-val').innerText = state.vref;
    document.getElementById('m788').className = state.model === '787-8' ? 'active' : '';
    document.getElementById('m789').className = state.model === '787-9' ? 'active' : '';
    document.getElementById('f25').className = state.flap === 25 ? 'active' : '';
    document.getElementById('f30').className = state.flap === 30 ? 'active' : '';
    calculateAll();
}

function setModel(m) { state.model = m; state.wgt = (m === '787-8' ? 320000 : 360000); updateDisplay(); }
function setFlap(f) { state.flap = f; updateDisplay(); }

// --- Service Worker登録（PWA） ---
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW:', e));
}

// --- 初期化 ---
buildAptDropdown();
loadState();
fetchAllWeather();
</script>
