<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00b4d8">
    <link rel="manifest" href="/787-LDG-Perf/manifest.json">
    <title>787 Perf Tool Pro</title>
    <style>
        :root {
            --bg: #0a0a0a; --card: #121212; --border: #333;
            --cyan: #00b4d8; --green: #00ff41; --grey: #a0a0a0;
            --active: #004d4d; --red: #ff4d4d;
            --alert-bg: #441111; --alert-txt: #ff9999;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .wrap { display: flex; gap: 12px; width: 100%; max-width: 1150px; }
        @media (max-width: 700px) { .wrap { flex-direction: column; } }

        /* гғ‘гғҚгғ« */
        .panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; flex: 1; min-width: 0; }
        h2 { color: var(--cyan); font-size: 12px; margin: 0 0 10px; border-bottom: 1px solid var(--border); padding-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* дёҠйғЁгӮігғігғҲгғӯгғјгғ« */
        .top-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
        .seg { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; width: 260px; height: 40px; }
        .seg div { flex: 1; text-align: center; line-height: 40px; background: #1a1a1a; cursor: pointer; font-size: 13px; font-weight: bold; }
        .seg div.on { box-shadow: inset 0 0 0 2px var(--cyan); color: var(--green); background: var(--active); }

        /* FCST GMT */
        .fcst-wrap { display: flex; align-items: center; gap: 6px; }
        .fcst-wrap span { color: var(--grey); font-size: 10px; font-weight: bold; }
        .fcst-box { display: flex; align-items: center; gap: 4px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; padding: 3px; height: 40px; }
        .fcst-box button { background: #2a2a2a; border: none; color: #fff; width: 36px; height: 100%; font-size: 15px; font-weight: bold; border-radius: 3px; cursor: pointer; }
        .fcst-val { color: var(--cyan); font-family: 'Consolas', monospace; font-size: 15px; font-weight: bold; width: 68px; text-align: center; }

        /* TAFгғңгғғгӮҜгӮ№ - еёёжҷӮиЎЁзӨә */
        #taf-box {
            display: block;
            background: #060606;
            border: 1px solid #1a1a1a;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.8), inset 0 0 0 1px #2a2a2a;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 10px;
            min-height: 60px;
        }
        #taf-raw {
            color: #bbb;
            font-size: 13px;
            font-family: 'Consolas', monospace;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }
        #taf-raw .hi { background: var(--active); color: #fff; font-weight: bold; border-left: 3px solid var(--cyan); display: block; padding-left: 4px; }

        /* гӮ№гғҶгғјгӮҝгӮ№ */
        .status { font-size: 10px; color: var(--cyan); font-style: italic; text-align: center; margin-bottom: 8px; min-height: 14px; }

        /* е…ҘеҠӣиЎҢ */
        .rows { display: flex; flex-direction: column; gap: 8px; }
        .row { display: flex; justify-content: center; align-items: center; gap: 16px; min-height: 38px; }
        .lft, .rgt { display: flex; align-items: center; gap: 8px; flex: 1; }
        .lft { justify-content: flex-end; }
        .rgt { justify-content: flex-start; }
        .lft label { width: 58px; text-align: right; color: var(--grey); font-size: 11px; font-weight: bold; }
        .rgt label { color: var(--grey); font-size: 11px; font-weight: bold; }

        /* гӮӨгғігғ—гғғгғҲгғңгғғгӮҜгӮ№ */
        .ibox { display: flex; align-items: center; gap: 4px; background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; height: 36px; padding: 3px; }
        .ibox.bright { border-color: #aaa; }
        .ibox.bright button { background: #333; }
        .ibox.w140 { width: 140px; }
        .ibox.w210 { width: 210px; }
        .ibox button { background: #2a2a2a; border: none; color: #fff; width: 28px; height: 100%; font-size: 14px; border-radius: 3px; cursor: pointer; flex-shrink: 0; }
        .ibox .v { color: var(--green); font-weight: bold; font-family: 'Consolas', monospace; font-size: 18px; flex: 1; text-align: center; min-width: 0; }

        /* гӮ»гӮ°гғЎгғігғҲе°Ҹ */
        .seg2 { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; width: 120px; height: 36px; }
        .seg2 div { flex: 1; text-align: center; line-height: 36px; background: #1a1a1a; cursor: pointer; font-size: 12px; font-weight: bold; }
        .seg2 div.on { box-shadow: inset 0 0 0 2px var(--cyan); color: var(--green); background: var(--active); }

        /* гӮ»гғ¬гӮҜгғҲ */
        select { background: #1a1a1a; color: var(--green); border: 1px solid var(--border); width: 140px; height: 36px; font-weight: bold; border-radius: 4px; font-size: 15px; padding: 0 5px; }

        /* гғҰгғӢгғғгғҲгғңгӮҝгғі */
        .ubtn { background: #2a2a2a; border: 1px solid var(--border); color: var(--grey); border-radius: 4px; padding: 0 10px; height: 36px; cursor: pointer; font-size: 11px; font-weight: bold; }
        .ubtn.on { border-color: var(--cyan); color: var(--cyan); background: var(--active); }

        /* гӮ«гӮ№гӮҝгғ гғүгғӯгғғгғ—гғҖгӮҰгғі */
        .dd-wrap { position: relative; width: 140px; height: 36px; }
        .dd-trigger { background: #1a1a1a; border: 1px solid var(--border); border-radius: 4px; width: 100%; height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; cursor: pointer; font-weight: bold; font-size: 16px; font-family: 'Consolas', monospace; }
        .dd-arrow { color: var(--grey); font-size: 10px; }
        .dd-list { display: none; position: fixed; z-index: 9999; background: #1a1a1a; border: 1px solid var(--cyan); border-radius: 6px; overflow-y: auto; max-height: 60vh; box-shadow: 0 8px 32px rgba(0,0,0,.8); min-width: 140px; }
        .dd-list.open { display: block; }
        .dd-item { padding: 10px 14px; cursor: pointer; font-size: 15px; font-weight: bold; font-family: 'Consolas', monospace; border-bottom: 1px solid #222; }
        .dd-item:hover { background: #2a2a2a; }
        .dd-item.sel { background: var(--active); }
        .jp { color: #adff2f; } .kr { color: #00ff7f; } .tw { color: #ffa500; }
        .cn { color: #ff4d4d; } .sea { color: #ffa500; } .us { color: #00b4d8; }

        /* Results */
        .res-box { border: 2px solid var(--cyan); padding: 12px; border-radius: 4px; margin-bottom: 12px; background: rgba(0,180,216,.08); }
        .res-row { display: flex; justify-content: space-between; align-items: baseline; }
        .res-n1 { font-size: 40px; font-weight: bold; font-family: 'Consolas', monospace; color: #ff0; }
        .res-u { font-size: 14px; margin-left: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--cyan); padding: 5px 2px; border-bottom: 1px solid var(--cyan); font-size: 10px; }
        td { padding: 9px 2px; border-bottom: 1px solid #1e1e1e; color: #fff; font-size: 17px; font-family: 'Consolas', monospace; }
        .ar td { background: #0d1f0d; }
        .ar td:first-child { color: var(--green) !important; font-weight: bold; }
        .al { background: var(--alert-bg) !important; color: var(--alert-txt) !important; }
        .twy-hdr { background: #1a1a1a; color: var(--cyan); font-size: 10px; text-align: center; font-weight: bold; padding: 5px; }
        .hi-spd { color: var(--cyan); } .lo-spd { color: var(--red); }
        .bt-ok { color: var(--green); } .bt-ng { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>
<div class="wrap">

  <!-- LEFT PANEL -->
  <div class="panel">
    <h2>Input Parameters</h2>

    <!-- гғўгғҮгғ« + FCST GMT -->
    <div class="top-row">
      <div class="seg">
        <div id="m8" onclick="setModel('787-8')">787-8</div>
        <div id="m9" onclick="setModel('787-9')">787-9</div>
      </div>
      <div class="fcst-wrap">
        <span>FCST GMT</span>
        <div class="fcst-box">
          <button onclick="stepFcst(-1)">-</button>
          <div class="fcst-val" id="fcst-val">NOW</div>
          <button onclick="stepFcst(1)">+</button>
          <button onclick="stepFcst(3)">+3</button>
        </div>
      </div>
    </div>

    <!-- TAFгғңгғғгӮҜгӮ№пјҲFCST GMTзӣҙдёӢгғ»еёёжҷӮиЎЁзӨәпјү -->
    <div id="taf-box">
      <div id="taf-raw">FETCHING TAF...</div>
    </div>

    <!-- гӮ№гғҶгғјгӮҝгӮ№ -->
    <div class="status" id="status">READY</div>

    <!-- е…ҘеҠӣгғ•гӮ©гғјгғ  -->
    <div class="rows">

      <div class="row">
        <div class="lft">
          <label>ARPT</label>
          <div class="dd-wrap">
            <div class="dd-trigger" id="dd-trigger" onclick="ddToggle(event)">
              <span id="dd-val" class="jp">HND</span>
              <span class="dd-arrow">в–ј</span>
            </div>
            <div class="dd-list" id="dd-list"></div>
          </div>
        </div>
        <div class="rgt"></div>
      </div>

      <div class="row">
        <div class="lft">
          <label>RWY</label>
          <select id="rwy" onchange="onRwyChange()"></select>
        </div>
        <div class="rgt">
          <div class="seg2">
            <div id="f25" onclick="setFlap(25)">25</div>
            <div id="f30" onclick="setFlap(30)">30</div>
          </div>
          <label>FLAP</label>
        </div>
      </div>

      <div class="row">
        <div class="lft">
          <label>COND</label>
          <div class="ibox w140"><button onclick="adj('cond',-1)">-</button><div class="v" id="v-cond">6</div><button onclick="adj('cond',1)">+</button></div>
        </div>
        <div class="rgt"></div>
      </div>

      <div class="row">
        <div class="lft">
          <label>WIND</label>
          <div class="ibox w210 bright"><button onclick="adj('wind',-5)">&lt;</button><button onclick="adj('wind',-1)">-</button><div class="v" id="v-wind">H 0</div><button onclick="adj('wind',1)">+</button><button onclick="adj('wind',5)">&gt;</button></div>
        </div>
        <div class="rgt">
          <div class="ibox w140"><button onclick="adj('brks',-1)">-</button><div class="v" id="v-brks">3</div><button onclick="adj('brks',1)">+</button></div>
          <label>BRKS</label>
        </div>
      </div>

      <div class="row">
        <div class="lft">
          <label>OAT</label>
          <div class="ibox w210 bright"><button onclick="adj('oat',-5)">&lt;</button><button onclick="adj('oat',-1)">-</button><div class="v" id="v-oat">15</div><button onclick="adj('oat',1)">+</button><button onclick="adj('oat',5)">&gt;</button></div>
        </div>
        <div class="rgt">
          <select id="rev" onchange="redraw()"><option value="MAX">MAX REV</option><option value="ONE">ONE REV</option><option value="NO">NO REV</option></select>
          <label>REV</label>
        </div>
      </div>

      <div class="row">
        <div class="lft">
          <label>QNH</label>
          <div class="ibox w210 bright"><button onclick="adj('qnh',-10)">&lt;</button><button onclick="adj('qnh',-1)">-</button><div class="v" id="v-qnh">29.92</div><button onclick="adj('qnh',1)">+</button><button onclick="adj('qnh',10)">&gt;</button></div>
        </div>
        <div class="rgt">
          <button class="ubtn on" id="u-inhg" onclick="setUnit('inHg')">inHg</button>
          <button class="ubtn" id="u-hpa" onclick="setUnit('hPa')">hPa</button>
        </div>
      </div>

      <div class="row">
        <div class="lft">
          <label>WEIGHT</label>
          <div class="ibox w210 bright"><button onclick="adj('wgt',-10)">&lt;</button><button onclick="adj('wgt',-1)">-</button><div class="v" id="v-wgt">320T</div><button onclick="adj('wgt',1)">+</button><button onclick="adj('wgt',10)">&gt;</button></div>
        </div>
        <div class="rgt">
          <label>VREF ADD</label>
          <div class="ibox w140 bright"><button onclick="adj('vref',-1)">-</button><div class="v" id="v-vref">5</div><button onclick="adj('vref',1)">+</button></div>
        </div>
      </div>

      <div class="row">
        <div class="lft"></div>
        <div class="rgt">
          <span style="color:var(--grey);font-size:11px;font-weight:bold;white-space:nowrap;">VREF / VAPP</span>
          <span id="v-vref-spd" style="font-family:'Consolas',monospace;font-size:16px;margin-left:6px;">--- / --- kt</span>
        </div>
      </div>

    </div><!-- .rows -->

    <!-- TARGET THRUSTпјҲе·Ұгғ‘гғҚгғ«дёӢйғЁпјү -->
    <div class="res-box" style="margin-top:14px;">
      <div style="text-align:center;">
        <div style="color:var(--grey);font-size:11px;margin-bottom:4px;">TARGET THRUST</div>
        <div><span class="res-n1" id="res-n1">--.-</span><span class="res-u">% N1</span></div>
      </div>
    </div>

  </div><!-- left panel -->

  <!-- RIGHT PANEL -->
  <div class="panel" style="max-width:500px;">
    <h2>Results</h2>
    <!-- PATHе…ҘеҠӣ -->
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      <span style="color:var(--grey);font-size:11px;font-weight:bold;white-space:nowrap;">G/S PATH</span>
      <div class="ibox w210">
        <button onclick="adj('path',-0.1)">&lt;</button>
        <button onclick="adj('path',-0.01)">-</button>
        <div class="v" id="v-path">3.00В°</div>
        <button onclick="adj('path',0.01)">+</button>
        <button onclick="adj('path',0.1)">&gt;</button>
      </div>
      <button id="btn-path-y" onclick="setPath(3.25)" style="display:none;background:#1a1a1a;border:1px solid #ef4444;color:#ef4444;border-radius:4px;padding:0 10px;height:36px;cursor:pointer;font-weight:bold;font-size:13px;">Y</button>
      <button id="btn-path-z" onclick="setPath(3.02)" style="display:none;background:#1a1a1a;border:1px solid #3b82f6;color:#3b82f6;border-radius:4px;padding:0 10px;height:36px;cursor:pointer;font-weight:bold;font-size:13px;">Z</button>
    </div>

    <!-- Path Expansion Visualizer -->
    <div style="background:#060b14;border:1px solid #1e293b;border-radius:8px;margin-bottom:10px;padding:8px;position:relative;">
      <svg id="path-svg" viewBox="0 0 500 175" style="width:100%;display:block;overflow:hidden;">
        <defs>
          <clipPath id="viz-clip">
            <rect x="0" y="0" width="500" height="175"/>
          </clipPath>
          <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </marker>
        </defs>
        <!-- Ground line only -->
        <line x1="0" y1="170" x2="500" y2="170" stroke="#334155" stroke-width="1.5"/>
        <!-- Lines drawn by JS -->
        <line id="viz-z"    x1="0" y1="170" x2="0" y2="170" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
        <line id="viz-papi" x1="0" y1="170" x2="0" y2="170" stroke="#ff69b4" stroke-width="2"   stroke-linecap="round"/>
        <line id="viz-y"    x1="0" y1="170" x2="0" y2="170" stroke="#ef4444" stroke-width="4"   stroke-linecap="round"/>
        <!-- Arc Y vs PAPI -->
        <g clip-path="url(#viz-clip)">
          <path id="viz-arc-y" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3 3"/>
          <text id="viz-arc-y-txt" fill="#ef4444" font-size="17" font-family="monospace" font-weight="900" text-anchor="middle"></text>
          <!-- Arc Z vs PAPI -->
          <path id="viz-arc-z" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 3"/>
          <text id="viz-arc-z-txt" fill="#3b82f6" font-size="17" font-family="monospace" font-weight="900" text-anchor="middle"></text>
          <!-- Labels -->
          <text id="viz-lbl-y"    fill="#ef4444" font-size="17" font-family="monospace" font-weight="800"></text>
          <text id="viz-lbl-papi" fill="#ff69b4" font-size="17" font-family="monospace" font-weight="700"></text>
          <text id="viz-lbl-z"    fill="#3b82f6" font-size="17" font-family="monospace" font-weight="700"></text>
          <!-- Descent rate: positioned dynamically below each label -->
          <text id="viz-rod-y"    fill="#ef4444" font-size="17" font-family="monospace" font-weight="700"></text>
          <text id="viz-rod-papi" fill="#ff69b4" font-size="17" font-family="monospace" font-weight="700"></text>
          <text id="viz-rod-z"    fill="#3b82f6" font-size="17" font-family="monospace" font-weight="700"></text>
        </g>
      </svg>
    </div>
    <table>
      <thead><tr><th>A/B</th><th>ADVISORY (FT)</th><th>1NM (В°C)</th><th>2NM (В°C)</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div><!-- .wrap -->

let S = {
    model:'787-8', flap:25, brk:2, cond:6, wind:0,
    oat:15, qnh:29.92, unit:'inHg', vref:5,
    apt:'HND', rwy:'34L', wgt:320000, fcst:0,
    path: 3.00   // glide path angle (degrees)
};
let TAF_CACHE = {};   // { icao: { hdr, lines:[{text,day,hour}] } }

// ================================================================
// TAF FETCH & PARSE
// ================================================================
async function fetchTaf(icao) {
    const id = ICAO4[icao] || icao;
    try {
        const r = await fetch(`https://aviationweather.gov/api/data/taf?ids=${id}&format=json&metar=false`);
        if (!r.ok) return null;
        const d = await r.json();
        if (!Array.isArray(d) || d.length === 0) return null;
        return parseTaf(d[0], icao);
    } catch(e) { return null; }
}

function parseTaf(obj) {
    // taf.jsonеҪўејҸ: { raw, issued } гҒҫгҒҹгҒҜ aviationweather.govеҪўејҸ
    const raw = (obj.raw || obj.rawTAF || obj.raw_text || obj.tafText || '').trim();
    if (!raw) return null;
    const issued = obj.issued || obj.issueTime || obj.issue_time || '';

    // BECMG / TEMPO / FM / PROB гҒ®еүҚгҒ§ж”№иЎҢгҒ—гҒҰгғ•гӮ©гғјгғһгғғгғҲ
    const fmt = raw
        .replace(/\s+(BECMG|TEMPO|FM\d{6}|PROB\d{2}(?:\s+TEMPO)?)\s+/g, '\n  $1 ')
        .trim();

    const lines = fmt.split('\n').map(l => {
        const t = l.trim();
        let day = null, hour = null;
        const bm = t.match(/^\w{4}\s+\d{6}Z\s+(\d{2})(\d{2})\/\d{4}/);
        const sm = t.match(/^(BECMG|TEMPO)\s+(\d{2})(\d{2})\/\d{4}/);
        const fm = t.match(/^FM(\d{2})(\d{2})\d{2}/);
        if (bm)  { day = +bm[1]; hour = +bm[2]; }
        if (sm)  { day = +sm[2]; hour = +sm[3]; }
        if (fm)  { day = +fm[1]; hour = +fm[2]; }
        const wm = t.match(/(\d{3}|VRB)(\d{2,3})(G\d{2,3})?KT/);
        return {
            text: l, day, hour,
            wdir: wm && wm[1] !== 'VRB' ? +wm[1] : null,
            wspd: wm ? +wm[2] : null
        };
    });

    return { hdr: issued, raw, lines };
}

function activeGroupIdx() {
    // taf.groupsгҒ®offset_hгӮ’дҪҝгҒЈгҒҰзҸҫеңЁгҒ®FCSTжҷӮеҲ»гҒ«еҜҫеҝңгҒҷгӮӢгӮ°гғ«гғјгғ—гӮ’йҒёгҒ¶
    const taf = TAF_CACHE[S.apt];
    if (!taf || !taf.groups || taf.groups.length === 0) return -1;
    let idx = 0;
    taf.groups.forEach((g, i) => {
        // offset_h <= S.fcst гҒ®гӮ°гғ«гғјгғ—гҒ®гҒҶгҒЎжңҖеҫҢгҒ®гӮӮгҒ®гӮ’йҒёгҒ¶
        if (g.offset_h <= S.fcst) idx = i;
    });
    return idx;
}

function activeLineIdx() {
    // parseTafз”ұжқҘгҒ®linesпјҲеҫҢж–№дә’жҸӣпјү
    const taf = TAF_CACHE[S.apt];
    if (!taf || !taf.lines) return -1;
    const now = new Date();
    const tDay  = now.getUTCDate() + Math.floor((now.getUTCHours() + S.fcst) / 24);
    const tHour = (now.getUTCHours() + S.fcst) % 24;
    let idx = 0;
    taf.lines.forEach((l, i) => {
        if (l.day === null) return;
        if (l.day < tDay || (l.day === tDay && l.hour <= tHour)) idx = i;
    });
    return idx;
}

function renderTaf() {
    const el = document.getElementById('taf-raw');
    const taf = TAF_CACHE[S.apt];
    if (!taf || !taf.raw) {
        el.textContent = taf ? 'TAF NOT AVAILABLE' : 'NO TAF';
        return;
    }
    const raw = taf.raw
        .replace(/\s+(BECMG|TEMPO|FM\d{6}|PROB\d{2})\s+/g, '\n  $1 ')
        .trim();
    el.textContent = raw;
}

// ================================================================
// WIND & OAT FROM TAF / METAR
// ================================================================
function windComponent(wdir, wspd) {
    // еҗ‘гҒӢгҒ„йўЁжҲҗеҲҶиЁҲз®—пјҲVRBгҒҜTailжүұгҒ„пјү
    if (!S.rwy || wspd === null || wspd === undefined) return null;
    if (wdir === 'VRB' || wdir === null) {
        // VRB вҶ’ иҝҪгҒ„йўЁпјҲTailwindпјүгҒЁгҒ—гҒҰиҝ”гҒҷ
        return -Math.abs(wspd);
    }
    const rwyDeg = parseInt(S.rwy.replace(/[LRC]/g,'')) * 10;
    const diff = ((wdir - rwyDeg + 360) % 360);
    const angle = diff > 180 ? diff - 360 : diff;
    return Math.round(wspd * Math.cos(angle * Math.PI / 180));
}

function applyTafToState() {
    const taf = TAF_CACHE[S.apt];
    if (!taf) return;

    if (S.fcst === 0) {
        // NOW вҶ’ METARгҒ®е®ҹжё¬еҖӨгӮ’е„Әе…Ҳ
        if (taf.metar_wdir !== undefined) {
            const w = windComponent(taf.metar_wdir, taf.metar_wspd);
            if (w !== null) S.wind = w;
        }
        if (taf.metar_oat !== null && taf.metar_oat !== undefined) {
            S.oat = taf.metar_oat;
        } else if (taf.hourly_oat) {
            S.oat = taf.hourly_oat[0];
        }
        if (taf.metar_qnh !== null && taf.metar_qnh !== undefined) {
            S.qnh = inHg()
                ? parseFloat((taf.metar_qnh * 0.02953).toFixed(2))
                : Math.round(taf.metar_qnh);
        }
    } else {
        // FCSTжҷӮеҲ» вҶ’ TAFгӮ°гғ«гғјгғ—гҒ®йўЁгӮ’дҪҝгҒҶ
        const gi = activeGroupIdx();
        if (gi >= 0 && taf.groups && taf.groups[gi]) {
            const g = taf.groups[gi];
            const w = windComponent(g.wdir, g.wspd);
            if (w !== null) S.wind = w;
        }
        // ж°—жё© вҶ’ hourly_oat[fcst]
        if (taf.hourly_oat && taf.hourly_oat[S.fcst] !== undefined) {
            S.oat = taf.hourly_oat[S.fcst];
        }
        // QNHгҒҜдәҲе ұгҒӘгҒ— вҶ’ еӨүжӣҙгҒ—гҒӘгҒ„
    }
}

async function fetchAllTaf() {
    setStatus('FETCHING TAF...');
    try {
        const r = await fetch('./taf.json?t=' + Date.now());
        if (!r.ok) throw new Error('taf.json ' + r.status);
        const data = await r.json();
        Object.entries(data.tafs || {}).forEach(([iata, t]) => {
            const parsed = parseTaf(t);
            const entry = parsed || { hdr:'', raw:'', lines:[] };
            TAF_CACHE[iata] = entry;
            // groupsгҒЁMETARгғҮгғјгӮҝгӮ’дҝқеӯҳ
            TAF_CACHE[iata].groups      = t.groups      ?? [];
            TAF_CACHE[iata].metar_wdir  = t.metar_wdir  ?? null;
            TAF_CACHE[iata].metar_wspd  = t.metar_wspd  ?? null;
            TAF_CACHE[iata].metar_oat   = t.metar_oat   ?? null;
            TAF_CACHE[iata].metar_qnh   = t.metar_qnh   ?? null;
            TAF_CACHE[iata].hourly_oat  = t.hourly_oat  ?? null;
        });
        save();
        setStatus('TAF UPDATED: ' + (data.updated || ''));
    } catch(e) {
        setStatus('TAF CACHE: ' + Object.keys(TAF_CACHE).length + ' airports');
    }
    renderTaf();
    applyTafToState();
    draw();
}

function adj(f, a) {
    if (f==='wgt') S.wgt += 1000*a;
    else if (f==='qnh') {
        const s = inHg() ? (Math.abs(a)===10?0.1:0.01) : (Math.abs(a)===10?10:1);
        S.qnh = parseFloat((S.qnh + (a>0?s:-s)).toFixed(2));
    }
    else if (f==='cond') S.cond = Math.max(1, Math.min(6, S.cond+a));
    else if (f==='brk')  S.brk  = Math.max(0, Math.min(4, S.brk+a));
    else if (f==='vref') S.vref = Math.max(0, Math.min(20, S.vref+a));
    else if (f==='wind') S.wind += a;
    else if (f==='oat')  S.oat  += a;
    else if (f==='path') S.path = Math.round((Math.max(2.0, Math.min(5.0, S.path + a))) * 100) / 100;
    else if (f==='brks') S.brk  = Math.max(0, Math.min(4, S.brk+a));
    draw();
}

function btLim(dk, n) {
    const da = BT[S.model][S.flap]; if (!da) return '-';
    const tw = S.wgt/1000;
    if (tw > da[0].w) return '-';
    if (tw <= da[da.length-1].w) return 40;
    const ui = da.findIndex((d,i) => d.w>=tw && da[i+1]?.w<tw);
    const U=da[ui]||da[0], L=da[ui+1]||U;
    function iv(dp,nb) { if(dp[nb]!==undefined)return dp[nb]; const ks=Object.keys(dp).map(Number).sort((a,b)=>a-b); return nb<ks[0]?40:'C'; }
    const vU=iv(U[dk],n), vL=iv(L[dk],n);
    if(vU==='C'||vL==='C') return 'C';
    if(U===L) return vU;
    return vL + (vU-vL)*(tw-L.w)/(U.w-L.w);
}
function fmtBt(lim) {
    if(lim==='-') return '-';
    if(lim==='C') return '<span class="bt-ng">CTN</span>';
    const bad = S.oat > lim;
    return `<span class="${bad?'bt-ng':'bt-ok'}">${lim>=40?'40.0':lim.toFixed(1)}</span>`;
}

function getVref(model, flap, wgtLbs) {
    const tbl = VREF_DATA[model]?.[flap];
    if (!tbl) return null;
    const wKlb = Math.round(wgtLbs / 1000 / 20) * 20; // 20еҲ»гҒҝгҒ§дёёгӮҒгӮӢ
    const keys = Object.keys(tbl).map(Number).sort((a,b) => b-a);
    // иЈңй–“
    const wKlb20 = wgtLbs / 1000;
    let upper = keys.find(k => k >= wKlb20);
    let lower = keys.find(k => k <= wKlb20);
    if (upper === undefined) upper = keys[0];
    if (lower === undefined) lower = keys[keys.length-1];
    if (upper === lower) return tbl[upper];
    const vU = tbl[upper], vL = tbl[lower];
    return Math.round(vL + (vU - vL) * (wKlb20 - lower) / (upper - lower));
}

function calcDescentRate(pathDeg, vappKt) {
    // йҷҚдёӢзҺҮ = Vapp(kt) * sin(pathВ°) * 101.269 ft/min/kt
    // з°Ўжҳ“ејҸ: ROD = Vapp * tan(pathВ°) * 101.269
    const r = pathDeg * Math.PI / 180;
    return Math.round(vappKt * Math.tan(r) * 101.269);
}
// ================================================================
const VIZ_GND_Y  = 170;
const VIZ_ORIGIN = 0;
const VIZ_BASE   = 20;
const VIZ_SCALE  = 50.0;  // жӢЎеӨ§пјҡз·ҡй–“гӮ’еәғгҒ’гӮӢ

function vizExpRatio(oat) { return 1 + ((oat - 15) / 10) * 0.04; }
function vizEffAngle(src, oat) {
    const ratio = vizExpRatio(oat);
    return Math.atan(Math.tan(src * Math.PI / 180) * ratio) * 180 / Math.PI;
}
function vizDisp(realAngle, baseAngle) {
    return Math.max(4, Math.min(80, VIZ_BASE + (realAngle - baseAngle) * VIZ_SCALE));
}
// з·ҡгҒ®й•·гҒ•пјҡгғңгғғгӮҜгӮ№й«ҳгҒ•гҒ®еҚҠеҲҶпјҲиөӨгғ»й»„иүІз”Ёпјү
function vizLen(dispDeg) {
    const r = dispDeg * Math.PI / 180;
    if (r < 0.001) return 245;
    const maxLen = (VIZ_GND_Y - 85) / Math.sin(r);
    return Math.min(245, Math.max(50, maxLen));
}
// йқ’з·ҡпјҲPAPIпјүз”ЁпјҡгғңгғғгӮҜгӮ№дёҠз«ҜгҒҫгҒ§
function vizLenFull(dispDeg) {
    const r = dispDeg * Math.PI / 180;
    if (r < 0.001) return 490;
    const len = (VIZ_GND_Y - 8) / Math.sin(r);
    return Math.min(490, Math.max(50, len));
}
function vizTip(dispDeg, len) {
    const r = dispDeg * Math.PI / 180;
    return { x: VIZ_ORIGIN + len * Math.cos(r), y: VIZ_GND_Y - len * Math.sin(r) };
}
function vizArcPath(a1, a2, radius) {
    const r1 = a1 * Math.PI / 180, r2 = a2 * Math.PI / 180;
    const sx = VIZ_ORIGIN + radius * Math.cos(r1), sy = VIZ_GND_Y - radius * Math.sin(r1);
    const ex = VIZ_ORIGIN + radius * Math.cos(r2), ey = VIZ_GND_Y - radius * Math.sin(r2);
    const sweep = a1 > a2 ? 1 : 0;
    return `M ${sx.toFixed(1)} ${sy.toFixed(1)} A ${radius} ${radius} 0 0 ${sweep} ${ex.toFixed(1)} ${ey.toFixed(1)}`;
}
function vizArcMid(a1, a2, radius) {
    const mid = (a1 + a2) / 2;
    const r = mid * Math.PI / 180;
    return { x: VIZ_ORIGIN + radius * Math.cos(r), y: VIZ_GND_Y - radius * Math.sin(r) };
}

function drawViz() {
    const papi  = S.path;
    const oat   = S.oat;
    const isHND = (S.apt === 'HND');
    const ref   = 3.0;

    // иЎЁзӨәи§’еәҰпјҲеҹәжә–3.0В°еӣәе®ҡгҖҒгӮ№гӮұгғјгғ«20пјү
    const dispPapi = vizDisp(papi, ref);
    const dispY    = vizDisp(vizEffAngle(3.25, oat), ref);  // HNDгҒ®Y
    const dispZ    = vizDisp(vizEffAngle(3.02, oat), ref);  // HNDгҒ®Z
    const disp3    = vizDisp(vizEffAngle(3.0,  oat), ref);  // йқһHNDз”Ё

    // еҗ„з·ҡгҒ®й•·гҒ•пјҲйқ’гҒҜгғ•гғ«гҖҒиөӨгғ»й»„гҒҜеҚҠеҲҶпјү
    const lenPapi = vizLenFull(dispPapi);
    const lenY    = vizLen(dispY);
    const lenZ    = vizLen(isHND ? dispZ : disp3);

    const tipPapi = vizTip(dispPapi, lenPapi);
    const tipY    = vizTip(dispY, lenY);
    const tipZuse = vizTip(isHND ? dispZ : disp3, lenZ);

    // PAPIпјҲйқ’пјү
    const elPapi = document.getElementById('viz-papi');
    elPapi.setAttribute('x2', tipPapi.x.toFixed(1));
    elPapi.setAttribute('y2', tipPapi.y.toFixed(1));

    // иөӨз·ҡпјҲYпјүпјҡHNDгҒ®гҒҝиЎЁзӨә
    const elY = document.getElementById('viz-y');
    if (isHND) {
        elY.setAttribute('x2', tipY.x.toFixed(1));
        elY.setAttribute('y2', tipY.y.toFixed(1));
        elY.setAttribute('display', '');
    } else {
        elY.setAttribute('display', 'none');
    }

    // й»„иүІз·ҡпјҲZпјүпјҡHND=3.02В°иЈңжӯЈгҖҒйқһHND=3.0В°иЈңжӯЈ
    const dispZuse = isHND ? dispZ : disp3;
    const elZ = document.getElementById('viz-z');
    elZ.setAttribute('x2', tipZuse.x.toFixed(1));
    elZ.setAttribute('y2', tipZuse.y.toFixed(1));

    // HND: PAPIгҒ«иҝ‘гҒ„ж–№гӮ’еӨӘгҒҸ
    const effY3 = vizEffAngle(3.25, oat);
    const effZ3 = vizEffAngle(3.02, oat);
    const eff30 = vizEffAngle(3.0,  oat);
    const distY = isHND ? Math.abs(effY3 - papi) : Infinity;
    const distZ = isHND ? Math.abs(effZ3 - papi) : Math.abs(eff30 - papi);
    const yIsCloser = distY < distZ;

    if (isHND) {
        elY.setAttribute('stroke-width', yIsCloser ? '6' : '3');
        elZ.setAttribute('stroke-width', yIsCloser ? '3' : '6');
    } else {
        elZ.setAttribute('stroke-width', '4');
    }

    // гғ©гғҷгғ«пјҡPAPIгҒҜз·ҡз«ҜиҝҪеҫ“гҖҒY=е·ҰдёҠеӣәе®ҡгҖҒZ=еҸідёӢеӣәе®ҡ
    const setLbl = (id, text, big, show) => {

    // PAPIпјҡз·ҡз«ҜиҝҪеҫ“
    const lblPapi = document.getElementById('viz-lbl-papi');

    } else {

    }

    // ZпјҲй»„пјүпјҡеҸідёӢеӣәе®ҡ
    const lblZ = document.getElementById('viz-lbl-z');
    lblZ.setAttribute('x', '494');

function draw() {
    // N1
    const n1b = {"787-8":{25:{260:38.2,380:45.5},30:{260:42.1,380:49.7}},"787-9":{25:{300:40.3,420:47.4},30:{300:45.2,420:52.7}}};
    const tb = n1b[S.model][S.flap];
    const rs=S.model==='787-8'?260:300, re=S.model==='787-8'?380:420;
    const wl=S.wgt/1000;
    // N1иЁҲз®—пјҲpathиЈңжӯЈеҗ«гӮҖпјү
    // еҹәжә–3.0В°гҖҒ0.2В°ж·ұгҒҸгҒӘгӮӢгҒЁ-1.5%N1
    const pathCorr = (S.path - 3.0) / 0.2 * (-1.5);
    const n1 = tb[rs]+(tb[re]-tb[rs])*((wl-rs)/120)+(S.oat-15)/10+(S.wind>0?S.wind/10*1.5:0)+(S.vref-5)/5*1.5 + pathCorr;
    document.getElementById('res-n1').textContent = n1.toFixed(1);
    document.getElementById('v-path').textContent = S.path.toFixed(2) + 'В°';

    // е…ҘеҠӣеҖӨиЎЁзӨә
    document.getElementById('v-cond').textContent = S.cond;
    document.getElementById('v-brks').textContent = ["1","2","3","4","MAX AUTO"][S.brk];
    document.getElementById('v-wind').textContent = (S.wind>=0?'H ':'T ')+Math.abs(S.wind);
    document.getElementById('v-oat').textContent  = S.oat;
    document.getElementById('v-qnh').textContent  = inHg()?S.qnh.toFixed(2):S.qnh;
    document.getElementById('v-wgt').textContent  = (S.wgt/1000).toFixed(0)+'T';
    document.getElementById('v-vref').textContent = S.vref;

    // VREF / VAPP / йҷҚдёӢзҺҮ
    const vref = getVref(S.model, S.flap, S.wgt);
    const vapp = vref !== null ? vref + S.vref : null;
    const vrefEl = document.getElementById('v-vref-spd');
    if (vref !== null && vapp !== null) {
        vrefEl.innerHTML = `<span style="font-weight:300;color:#aaa">${vref}</span> / <span style="color:#ff00cc;font-weight:bold">${vapp} kt</span>`;
        const isHND2 = S.apt === 'HND';
        const oat2   = S.oat;
        const effY2  = vizEffAngle(3.25, oat2);
        const effZ2  = vizEffAngle(3.02, oat2);
        const eff32  = vizEffAngle(3.0,  oat2);
        const rodPapiVal = calcDescentRate(S.path, vapp);
        const rodYVal    = isHND2 ? calcDescentRate(effY2, vapp) : null;
        const rodZVal    = isHND2 ? calcDescentRate(effZ2, vapp) : calcDescentRate(eff32, vapp);
        // SVGеҶ…гҒ® descent rate гғҶгӮӯгӮ№гғҲгӮ’жӣҙж–°
        document.getElementById('viz-rod-papi').textContent = `${rodPapiVal} ft/m`;
        document.getElementById('viz-rod-y').textContent    = isHND2 ? `${rodYVal} ft/m` : '';
        document.getElementById('viz-rod-z').textContent    = `${rodZVal} ft/m`;    } else {
        vrefEl.textContent = '--- / --- kt';
        document.getElementById('viz-rod-papi').textContent = '';
        document.getElementById('viz-rod-y').textContent    = '';
        document.getElementById('viz-rod-z').textContent    = '';
    }
    document.getElementById('m8').className  = S.model==='787-8'?'on':'';
    document.getElementById('m9').className  = S.model==='787-9'?'on':'';
    document.getElementById('f25').className = S.flap===25?'on':'';
    document.getElementById('f30').className = S.flap===30?'on':'';

    // гғҶгғјгғ–гғ«иЁҲз®—
    const tbody = document.getElementById('tbody'); tbody.innerHTML='';
    const LBL=["1","2","3","4","MAX AUTO"], ORD=[4,3,2,1,0];
    const md = LDG[S.model]; if(!md) return;
    const fl = md[S.flap]; if(!fl) return;
    const ct = fl[S.cond] || fl[6] || fl[5];
    const rW = md.ref||380000;
    const rev = document.getElementById('rev').value;

    // AB3 dist for twy comparison
    const ab3 = ct[ORD[2]]||ct[0];
    let d3 = ab3.ref + ((S.wgt-rW)/10000)*(S.wgt>rW?ab3.wt[0]:Math.abs(ab3.wt[1]));
    d3 += S.wind>=0?(S.wind/10)*ab3.wind[0]:(Math.abs(S.wind)/10)*ab3.wind[1];
    d3 += (S.vref/5)*ab3.vref;
    if(ab3.temp) d3+=((S.oat-15)/10)*(S.oat>15?ab3.temp[0]:ab3.temp[1]);
    if(rev==='ONE') d3+=ab3.rev[0]; else if(rev==='NO') d3+=ab3.rev[1];

    const twys = TWYS[S.apt]?.[S.rwy]||null;
    const maxT = twys?Math.max(...twys.map(t=>t.d)):0;

    LBL.forEach((nm,i)=>{
        const d=ct[ORD[i]]||ct[0];
        let dist=d.ref; const wd=(S.wgt-rW)/10000;
        dist+=wd*(wd>0?d.wt[0]:Math.abs(d.wt[1]));
        dist+=S.wind>=0?(S.wind/10)*d.wind[0]:(Math.abs(S.wind)/10)*d.wind[1];
        dist+=(S.vref/5)*d.vref;
        if(d.temp) dist+=((S.oat-15)/10)*(S.oat>15?d.temp[0]:d.temp[1]);
        if(rev==='ONE') dist+=d.rev[0]; else if(rev==='NO') dist+=d.rev[1];
        let t1='-',t2='-';
        if(nm!=='MAX AUTO'){const n=parseInt(nm);t1=fmtBt(btLim('nm1',n));t2=fmtBt(btLim('nm2',n));}
        const tr=document.createElement('tr');
        if(i===S.brk) tr.className='ar';
        const tl=maxT>0&&dist>(maxT+1000);
        tr.innerHTML=`<td>${nm}</td><td class="${tl?'al':''}">${Math.round(dist).toLocaleString()}</td><td>${t1}</td><td>${t2}</td>`;
        tbody.appendChild(tr);
    });

    if(twys){
        const sep=document.createElement('tr');
        sep.innerHTML=`<td colspan="4" class="twy-hdr">VACATE DISTANCE (FT)</td>`;
        tbody.appendChild(sep);
        twys.forEach(tw=>{
            const tr=document.createElement('tr');
            const hi=HI_TWY.includes(tw.n);
            const sh=tw.d<(d3-1000);
            const cl=sh?'al':(hi?'hi-spd':'lo-spd');
            tr.innerHTML=`<td class="${cl}">${tw.n}</td><td class="${cl}">${tw.d.toLocaleString()}</td><td></td><td></td>`;
            tbody.appendChild(tr);
        });
    }
    save();
    drawViz();
}

// ================================================================
// SERVICE WORKER & INIT
// ================================================================
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/787-LDG-Perf/sw.js').catch(()=>{});
}

buildDD();
load();
fetchAllTaf();
</script>
