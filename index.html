<html lang="ja">

    <link rel="manifest" href="/787-LDG-Perf/manifest.json">
    <title>787 Perf Tool Pro</title>
    <style>
        :root {
            --bg-black: #0a0a0a; --card-bg: #121212; --border-color: #333;

            --btn-active: #004d4d; --caution-red: #ff4d4d;
            --alert-bg: #441111; --alert-text: #ff9999;

        body { background-color: var(--bg-black); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; }
        .main-container { display: flex; gap: 12px; width: 100%; max-width: 1150px; }
        @media (max-width: 700px) { .main-container { flex-direction: column; align-items: center; } }

        .panel { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 15px; flex: 1; min-width: 0; box-sizing: border-box; }
        h2 { color: var(--accent-cyan); font-size: 13px; margin: 0 0 12px 0; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; text-transform: uppercase; }

        .input-row-container { display: flex; flex-direction: column; gap: 8px; }
        .input-pair-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; height: 40px; }
        .left-item, .right-item { display: flex; align-items: center; gap: 10px; flex: 1; }
        .left-item { justify-content: flex-end; }
        .right-item { justify-content: flex-start; }
        .left-item label { width: 60px; text-align: right; color: var(--text-grey); font-size: 11px; font-weight: bold; }
        .right-item label { width: 80px; text-align: left; color: var(--text-grey); font-size: 11px; font-weight: bold; }

        .input-box { background: #1a1a1a; border: 1px solid var(--border-color); display: flex; align-items: center; border-radius: 4px; width: 140px; height: 36px; overflow: hidden; gap: 5px; padding: 4px; box-sizing: border-box; }
        .wide-box { width: 210px; }
        .input-box button { background: #2a2a2a; border: none; color: white; width: 28px; height: 100%; cursor: pointer; font-size: 15px; border-radius: 3px; flex-shrink: 0; }
        .input-box .val { color: var(--value-green); font-weight: bold; font-family: 'Consolas', monospace; font-size: 18px; flex: 1; text-align: center; min-width: 0; }

        .segment { display: flex; border: 1px solid var(--border-color); border-radius: 4px; overflow: hidden; width: 140px; height: 36px; }
        .segment div { flex: 1; text-align: center; line-height: 36px; background: #1a1a1a; cursor: pointer; font-size: 12px; font-weight: bold; }
        .segment div.active { box-shadow: inset 0 0 0 2px var(--accent-cyan); color: var(--value-green); background: var(--btn-active); }

        /* モデル＋予報時刻 */
        .top-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
        .forecast-box { display: flex; align-items: center; gap: 6px; }
        .forecast-box label { color: var(--text-grey); font-size: 10px; font-weight: bold; white-space: nowrap; }
        .fc-time-box { background: #1a1a1a; border: 1px solid var(--border-color); display: flex; align-items: center; border-radius: 4px; height: 40px; gap: 4px; padding: 4px; box-sizing: border-box; }
        .fc-time-box button { background: #2a2a2a; border: none; color: white; width: 36px; height: 100%; cursor: pointer; font-size: 16px; border-radius: 3px; font-weight: bold; }
        .fc-time-val { color: var(--accent-cyan); font-weight: bold; font-family: 'Consolas', monospace; font-size: 15px; width: 66px; text-align: center; }
        .fc-wind-info { font-size: 11px; color: var(--text-grey); text-align: center; margin-bottom: 4px; font-family: 'Consolas', monospace; min-height: 14px; }
        /* TAF表示エリア */
        .taf-box { background: #0d0d0d; border: 1px solid #2a2a2a; border-radius: 4px; padding: 8px 12px; margin-bottom: 8px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 2.0; overflow-x: auto; }
        .taf-line { color: #aaa; padding: 2px 5px; border-radius: 3px; white-space: pre; display: block; }
        .taf-line.taf-active { background: var(--btn-active); color: #fff; font-weight: bold; border-left: 3px solid var(--accent-cyan); }
        .taf-label { color: #555; font-size: 10px; margin-bottom: 4px; }

        .unit-btn { background: #2a2a2a; border: 1px solid var(--border-color); color: var(--text-grey); border-radius: 4px; padding: 0 8px; height: 36px; cursor: pointer; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .unit-btn.active { border-color: var(--accent-cyan); color: var(--accent-cyan); background: var(--btn-active); }

        .custom-select-wrapper { position: relative; width: 140px; height: 36px; }
        .custom-select-trigger { background: #1a1a1a; border: 1px solid var(--border-color); border-radius: 4px; width: 100%; height: 36px; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; box-sizing: border-box; cursor: pointer; font-weight: bold; font-size: 16px; font-family: 'Consolas', monospace; }
        .custom-select-trigger .arrow { color: var(--text-grey); font-size: 10px; margin-left: 4px; }
        .custom-select-dropdown { display: none; position: fixed; z-index: 9999; background: #1a1a1a; border: 1px solid var(--accent-cyan); border-radius: 6px; overflow-y: auto; max-height: 60vh; box-shadow: 0 8px 32px rgba(0,0,0,0.8); min-width: 140px; }
        .custom-select-dropdown.open { display: block; }
        .custom-select-option { padding: 10px 14px; cursor: pointer; font-size: 15px; font-weight: bold; font-family: 'Consolas', monospace; border-bottom: 1px solid #222; }
        .custom-select-option:hover { background: #2a2a2a; }
        .custom-select-option.selected { background: var(--btn-active); }

        .col-jp { color: #adff2f; } .col-kr { color: #00ff7f; } .col-tw { color: #ffa500; }
        .col-cn { color: #ff4d4d; } .col-sea { color: #ffa500; } .col-us { color: #00b4d8; }

        select { background: #1a1a1a; color: var(--value-green); border: 1px solid var(--border-color); width: 140px; height: 36px; font-weight: bold; border-radius: 4px; font-size: 16px; padding: 0 5px; }

        .res-box { border: 2px solid var(--accent-cyan); padding: 12px; border-radius: 4px; margin-bottom: 12px; background: rgba(0,180,216,0.1); }
        .res-row { display: flex; justify-content: space-between; align-items: baseline; }
        .res-val { font-size: 38px; font-weight: bold; font-family: 'Consolas', monospace; color: #ffff00; }
        .res-unit { font-size: 14px; color: white; margin-left: 4px; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: var(--accent-cyan); padding: 5px 2px; border-bottom: 1px solid var(--accent-cyan); font-size: 10px; }
        td { padding: 10px 2px; border-bottom: 1px solid #222; color: #fff; font-size: 18px; font-family: 'Consolas', monospace; }
        .active-row td { background: #112211; }
        .active-row td:first-child { color: var(--value-green) !important; font-weight: bold; }
        .alert-cell { background-color: var(--alert-bg) !important; color: var(--alert-text) !important; }
        .twy-header { background: #1a1a1a; color: var(--accent-cyan); font-size: 10px; text-align: center; font-weight: bold; padding: 5px 0; }
        .twy-hi { color: var(--accent-cyan); } .twy-norm { color: var(--caution-red); }

        .weather-info { font-size: 10px; color: var(--accent-cyan); font-style: italic; text-align: center; margin-bottom: 10px; }

</head>

// ============================================================
// TAF取得・パース
// ============================================================

// ICAOコードマッピング（aviationweather.govはICAO4文字を使用）
const icaoMap = {
    "CTS":"RJCC","NRT":"RJAA","HND":"RJTT","NGO":"RJGG","ITM":"RJOO",
    "KIX":"RJBB","FUK":"RJFF","OKA":"ROAH","GMP":"RKSS","TSA":"RCSS",
    "TPE":"RCTP","PEK":"ZBAA","PVG":"ZSPD","SHA":"ZSSS","DLC":"ZYTL",
    "HKG":"VHHH","CAN":"ZGGG","HAN":"VVNB","SGN":"VVTS","BKK":"VTBS",
    "KUL":"WMKK","SIN":"WSSS","CGK":"WIII","HNL":"PHNL"
};

// TAFキャッシュ { ICAO: { raw, groups: [{from, to, windDir, windSpd, windGust, raw}] } }
let tafCache = {};

async function fetchTafForApt(icao) {
    const icao4 = icaoMap[icao] || icao;
    const url = `https://aviationweather.gov/api/data/taf?ids=${icao4}&format=json&metar=false`;
    try {
        const res = await fetch(url);
        if (!res.ok) return null;
        const data = await res.json();
        if (!data || data.length === 0) return null;
        return parseTaf(data[0]);
    } catch(e) { return null; }
}

function parseTaf(taf) {
    // RAWテキストを取得
    const raw = (taf.rawTAF || taf.raw_text || taf.tafText || '').trim();
    if (!raw) return null;
    const issueTime = taf.issueTime || taf.issue_time || '';

    // BECMG / TEMPO / FM / PROB の前で改行して行に分割
    const formatted = raw
        .replace(/\s+(BECMG|TEMPO|FM\d{6}|PROB\d{2}\s+TEMPO|PROB\d{2})\s+/g, '\n  $1 ')
        .trim();

    const lines = formatted.split('\n').map(l => l.trimEnd());

    // 各行に時刻情報と風情報を付与
    const groups = lines.map(line => {
        const t = line.trim();
        // 時刻抽出
        const baseM  = t.match(/^\w{4}\s+\d{6}Z\s+(\d{2})(\d{2})\/\d{2}\d{2}/);
        const becmgM = t.match(/^(BECMG|TEMPO)\s+(\d{2})(\d{2})\/(\d{2})(\d{2})/);
        const fmM    = t.match(/^FM(\d{2})(\d{2})\d{2}/);
        // 風抽出
        const wm = t.match(/(\d{3}|VRB)(\d{2,3})(G\d{2,3})?KT/);

        let fromDay=null, fromHour=null;
        if (baseM)  { fromDay=parseInt(baseM[1]);  fromHour=parseInt(baseM[2]); }
        if (becmgM) { fromDay=parseInt(becmgM[2]); fromHour=parseInt(becmgM[3]); }
        if (fmM)    { fromDay=parseInt(fmM[1]);    fromHour=parseInt(fmM[2]); }

        return {
            text: line,
            fromDay, fromHour,
            windDir: wm && wm[1]!=='VRB' ? parseInt(wm[1]) : null,
            windSpd: wm ? parseInt(wm[2]) : null,
        };
    });

    return { raw, issueTime, groups };
}

function getActiveTafIndex(groups, targetDay, targetHour) {
    let idx = 0;
    for (let i = 0; i < groups.length; i++) {
        const g = groups[i];
        if (g.fromDay === null) continue;
        if (g.fromDay < targetDay || (g.fromDay === targetDay && g.fromHour <= targetHour)) {
            idx = i;
        }
    }
    return idx;
}

function renderTaf(icao, targetDay, targetHour) {
    const box    = document.getElementById('taf-box');
    const linesEl = document.getElementById('taf-lines');
    const labelEl = document.getElementById('taf-label');
    const taf = tafCache[icao];

    if (!taf || !taf.groups || taf.groups.length === 0) {
        box.style.display = 'none';
        return null;
    }

    box.style.display = 'block';
    const icao4 = icaoMap[icao] || icao;
    labelEl.innerText = `TAF ${icao4}  ${taf.issueTime || ''}`;

    const activeIdx = getActiveTafIndex(taf.groups, targetDay, targetHour);

    linesEl.innerHTML = '';
    taf.groups.forEach((g, i) => {
        const div = document.createElement('div');
        div.className = 'taf-line' + (i === activeIdx ? ' taf-active' : '');
        div.innerText = g.text;
        linesEl.appendChild(div);
    });

    return taf.groups[activeIdx];
}

// ============================================================
// applyForecast（TAF表示 + OAT/WIND反映）
// ============================================================
function applyForecast() {
    const el     = document.getElementById('fcst-time-val');
    const windEl = document.getElementById('fc-wind-info');
    const cache  = weatherCache[state.apt];

    // 対象UTC時刻
    const nowUtc = new Date();
    const targetUtc = new Date(nowUtc);
    targetUtc.setUTCHours(nowUtc.getUTCHours() + state.fcstOffsetHours, 0, 0, 0);
    const targetDay  = targetUtc.getUTCDate();
    const targetHour = targetUtc.getUTCHours();

    // FCST GMT表示 & OAT更新
    if (state.fcstOffsetHours === 0) {
        el.innerText = 'NOW';
        if (cache) {
            state.oat  = cache.oat;
            state.qnh  = isinHg() ? parseFloat((cache.qnh*0.02953).toFixed(2)) : Math.round(cache.qnh);
        }
    } else {
        const fc = cache?.forecast?.[state.fcstOffsetHours];
        if (fc) {
            state.oat = Math.round(fc.oat);
            const hh = String(targetUtc.getUTCHours()).padStart(2,'0');
            el.innerText = hh + ':00Z';
        } else {
            el.innerText = '+' + state.fcstOffsetHours + 'h';
        }
    }

    // TAF表示のみ（風データ表示・RWY上書き・WIND計算はしない）
    renderTaf(state.apt, targetDay, targetHour);
    windEl.innerText = '';
}

function setQnhUnit(unit) {
    if (state.qnhUnit === unit) return;
    state.qnh = unit==='hPa' ? Math.round(state.qnh/0.02953) : parseFloat((state.qnh*0.02953).toFixed(2));
    state.qnhUnit = unit;
    document.getElementById('btn-inhg').classList.toggle('active', unit==='inHg');
    document.getElementById('btn-hpa').classList.toggle('active', unit==='hPa');
    updateDisplay();
}
function isinHg() { return state.qnhUnit === 'inHg'; }

// ============================================================
// 向かい風RWY自動選択
// ============================================================
function getBestRwy(apt, windDirDeg) {
    if (apt === 'ITM') return '32L';
    const rwys = Object.keys(airportData[apt].r);
    if (windDirDeg === null || windDirDeg === undefined) return rwys[0];

    // HND特例: 06Z〜10Zの間は22/23を除外（夜間騒音制限）
    const utcH = new Date().getUTCHours();
    let candidates = rwys;
    if (apt === 'HND' && utcH >= 6 && utcH < 10) {
        const f = rwys.filter(r => r !== '22' && r !== '23');
        if (f.length > 0) candidates = f;
    }

    function rwyToDeg(r) { return parseInt(r.replace(/[LRC]/g,'')) * 10; }
    function headwindDiff(rDeg, wDeg) {
        let d = Math.abs(rDeg - wDeg) % 360;
        return d > 180 ? 360 - d : d;
    }

    let best = candidates[0], bestScore = 999;
    candidates.forEach(r => {
        const s = headwindDiff(rwyToDeg(r), windDirDeg);
        if (s < bestScore) { bestScore = s; best = r; }
    });
    return best;
}

        opt.innerText = icao;

        dd.style.top = (rect.bottom+4)+'px';
        dd.style.left = rect.left+'px';
        dd.style.width = Math.max(rect.width,140)+'px';
        dd.classList.add('open');
    }
}
function closeAptDropdown() { document.getElementById('apt-dropdown').classList.remove('open'); }
document.addEventListener('click', closeAptDropdown);

function selectApt(icao) {
    state.apt = icao;
    state.fcstOffsetHours = 0;
    const tt = document.getElementById('apt-trigger-text');
    tt.className = getColorClass(airportData[icao].c);
    tt.innerText = icao;
    document.querySelectorAll('.custom-select-option').forEach(el => el.classList.toggle('selected', el.dataset.value===icao));
    closeAptDropdown();
    onAirportChange(false);
}

// ============================================================
// 保存・復元
// ============================================================
function saveState() {
    localStorage.setItem('perf_state_v53', JSON.stringify(state));
    localStorage.setItem('weather_cache_v2', JSON.stringify(weatherCache));
}
function loadState() {
    try { const w=localStorage.getItem('weather_cache_v2'); if(w) weatherCache=JSON.parse(w); } catch(e){}
    try { const t=localStorage.getItem('taf_cache_v1'); if(t) tafCache=JSON.parse(t); } catch(e){}
    try { const s=localStorage.getItem('perf_state_v53'); if(s) Object.assign(state, JSON.parse(s)); } catch(e){}
    document.getElementById('btn-inhg').classList.toggle('active', state.qnhUnit==='inHg');
    document.getElementById('btn-hpa').classList.toggle('active', state.qnhUnit==='hPa');
    selectApt(state.apt);
    onAirportChange(true);
}

// ============================================================
// 天気取得（現況＋予報）
// ============================================================
async function fetchAllWeather() {
    const statusEl = document.getElementById('weather-status');
    statusEl.innerText = "SYNCING WEATHER...";
    const icaos = Object.keys(airportData);
    const lats = icaos.map(k=>airportData[k].lat).join(',');
    const lons = icaos.map(k=>airportData[k].lon).join(',');
    try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lats}&longitude=${lons}`
            + `&current=temperature_2m,pressure_msl`
            + `&hourly=temperature_2m&forecast_days=2&timezone=UTC`;
        const res = await fetch(url);
        const data = await res.json();
        const arr = Array.isArray(data) ? data : [data];

        const nowUtc = new Date();
        const nowHourStr = nowUtc.getUTCFullYear()+'-'
            +String(nowUtc.getUTCMonth()+1).padStart(2,'0')+'-'
            +String(nowUtc.getUTCDate()).padStart(2,'0')+'T'
            +String(nowUtc.getUTCHours()).padStart(2,'0')+':00';

        icaos.forEach((icao, i) => {
            const d = arr[i] || arr[0];
            const curOat  = Math.round(d?.current?.temperature_2m ?? 15);
            const curQnh  = d?.current?.pressure_msl ?? 1013;
            const times   = d?.hourly?.time || [];
            const oats    = d?.hourly?.temperature_2m || [];
            const si = times.findIndex(t => t >= nowHourStr);
            const forecast = [];
            for (let j=0; j<24; j++) {
                const idx = si+j;
                if (idx>=0 && idx<times.length) forecast.push({
                    time: times[idx],
                    oat: oats[idx],
                });
            }
            weatherCache[icao] = { oat:curOat, qnh:curQnh, forecast };
        });
        localStorage.setItem('weather_cache_v2', JSON.stringify(weatherCache));
        statusEl.innerText = "WEATHER UPDATED - FETCHING TAF...";

        // TAF取得（全空港並行）
        const tafResults = await Promise.allSettled(
            icaos.map(icao => fetchTafForApt(icao))
        );
        icaos.forEach((icao, i) => {
            const r = tafResults[i];
            if (r.status === 'fulfilled' && r.value) {
                tafCache[icao] = r.value;
            }
        });
        localStorage.setItem('taf_cache_v1', JSON.stringify(tafCache));
        statusEl.innerText = "ALL WEATHER + TAF UPDATED";
    } catch(e) {
        statusEl.innerText = Object.keys(weatherCache).length > 0
            ? "OFFLINE - USING CACHED WEATHER" : "OFFLINE - NO WEATHER DATA";
    }
    applyForecast();
    updateDisplay();
}

// ============================================================
// 空港変更
// ============================================================
function onAirportChange(isLoad=false) {
    state.apt = document.getElementById('apt-trigger-text').innerText;
    const cache = weatherCache[state.apt];
    if (cache) {
        state.oat = cache.oat;
        state.qnh = isinHg() ? parseFloat((cache.qnh*0.02953).toFixed(2)) : Math.round(cache.qnh);
    } else {
        state.oat = 15; state.qnh = isinHg() ? 29.92 : 1013;
    }
    const rwySelect = document.getElementById('rwy-select');
    rwySelect.innerHTML = '';
    Object.keys(airportData[state.apt].r).forEach(r => {
        const o=document.createElement('option'); o.value=r; o.innerText=r; rwySelect.appendChild(o);
    });
    if (isLoad && airportData[state.apt].r[state.rwy]) {
        rwySelect.value = state.rwy;
    } else {
        // TAFキャッシュから風向きを取得してRWY自動選択
        const taf = tafCache[state.apt];
        const tafWind = taf?.groups?.find(g => g.windDir !== null);
        const windDir = tafWind?.windDir ?? null;
        const best = getBestRwy(state.apt, windDir);
        state.rwy = best; rwySelect.value = best;
    }
    if (!isLoad) {
        state.fcstOffsetHours = 0;
        state.rwyManual = false;  // 空港変更時はフラグリセット
    }
    applyForecast();
    updateDisplay();
}

function onRwyChange() {
    state.rwy = document.getElementById('rwy-select').value;
    state.rwyManual = true;  // 手動変更フラグ
    updateDisplay();
}

// ============================================================
// ステップ
// ============================================================
function step(field, amt) {
    if (field==='wgt') state.wgt += 1000*amt;
    else if (field==='qnh') {
        const s = isinHg() ? (Math.abs(amt)===10?0.1:0.01) : (Math.abs(amt)===10?10:1);
        state.qnh = parseFloat((state.qnh+(amt>0?s:-s)).toFixed(2));
    }
    else if (field==='cond') state.cond=Math.max(1,Math.min(6,state.cond+amt));
    else if (field==='brks') state.brksIdx=Math.max(0,Math.min(4,state.brksIdx+amt));
    else if (field==='vref') state.vref=Math.max(0,Math.min(20,state.vref+amt));
    else if (field==='wind') state.wind+=amt;
    else if (field==='oat')  state.oat+=amt;
    updateDisplay();
}

// ============================================================
// 計算
// ============================================================
function inferValue(dp, n) {
    if (dp[n]!==undefined) return dp[n];
    const keys=Object.keys(dp).map(Number).sort((a,b)=>a-b);
    return n<keys[0]?40.0:"Ctn";
}
function getBrakeTempLimit(dk, n) {
    const da=brakeTempData[state.model][state.flap]; if(!da) return "-";
    const tW=state.wgt/1000;
    if (tW>da[0].w) return "-"; if (tW<=da[da.length-1].w) return 40.0;
    const ui=da.findIndex((d,i)=>d.w>=tW&&da[i+1]?.w<tW);
    const U=da[ui]||da[0], L=da[ui+1]||U;
    const vU=inferValue(U[dk],n), vL=inferValue(L[dk],n);
    if(vU==="Ctn"||vL==="Ctn") return "Ctn";
    if(U===L) return vU;
    return vL+(vU-vL)*(tW-L.w)/(U.w-L.w);
}
function formatBrakeTemp(lim) {
    if(lim==="-") return "-"; if(lim==="Ctn") return '<span class="bt-caution">CTN</span>';
    const c=state.oat>lim; const dv=lim>=40?"40.0":lim.toFixed(1);
    return `<span class="${c?'bt-caution':'bt-safe'}">${dv}</span>`;
}

function calculateAll() {
    const n1Base={"787-8":{25:{260:38.2,380:45.5},30:{260:42.1,380:49.7}},"787-9":{25:{300:40.3,420:47.4},30:{300:45.2,420:52.7}}};
    const tN1=n1Base[state.model][state.flap];
    const rs=state.model==='787-8'?260:300, re=state.model==='787-8'?380:420;
    const wL=state.wgt/1000;
    const n1=tN1[rs]+(tN1[re]-tN1[rs])*((wL-rs)/120)+(state.oat-15)/10+(state.wind>0?state.wind/10*1.5:0)+(state.vref-5)/5*1.5;
    document.getElementById('res-n1').innerText=n1.toFixed(1);

    const tbody=document.getElementById('ldg-body'); tbody.innerHTML='';
    const labels=["1","2","3","4","MAX AUTO"], aomOrder=[4,3,2,1,0];
    const mfd=ldgPerf[state.model][state.flap]||ldgPerf["787-8"][30];
    const ct=mfd[state.cond]||mfd[6]||mfd[5];
    const refW=ldgPerf[state.model]?.refWgt||380000;
    const rev=document.getElementById('rev-select').value;

    const ab3=ct[aomOrder[2]]||ct[0];
    let ab3d=ab3.ref+((state.wgt-refW)/10000)*(state.wgt>refW?ab3.wt[0]:Math.abs(ab3.wt[1]));
    ab3d+=(state.wind>=0?(state.wind/10)*ab3.wind[0]:(Math.abs(state.wind)/10)*ab3.wind[1]);
    ab3d+=(state.vref/5)*ab3.vref;
    if(ab3.temp) ab3d+=((state.oat-15)/10)*(state.oat>15?ab3.temp[0]:ab3.temp[1]);
    if(rev==='ONE') ab3d+=ab3.rev[0]; else if(rev==='NO') ab3d+=ab3.rev[1];

    const twys=twyData[state.apt]?.[state.rwy]||null;
    const maxTwy=twys?Math.max(...twys.map(t=>t.d)):0;

    labels.forEach((name,i)=>{
        const d=ct[aomOrder[i]]||ct[0];
        let dist=d.ref; const wD=(state.wgt-refW)/10000;
        dist+=wD*(wD>0?d.wt[0]:Math.abs(d.wt[1]));
        dist+=(state.wind>=0?(state.wind/10)*d.wind[0]:(Math.abs(state.wind)/10)*d.wind[1]);
        dist+=(state.vref/5)*d.vref;
        if(d.temp) dist+=((state.oat-15)/10)*(state.oat>15?d.temp[0]:d.temp[1]);
        if(rev==='ONE') dist+=d.rev[0]; else if(rev==='NO') dist+=d.rev[1];
        let t1="-",t2="-";
        if(name!=="MAX AUTO"){const n=parseInt(name);t1=formatBrakeTemp(getBrakeTempLimit("nm1",n));t2=formatBrakeTemp(getBrakeTempLimit("nm2",n));}
        const tr=document.createElement('tr');
        if(i===state.brksIdx) tr.className='active-row';
        const tooLong=maxTwy>0&&dist>(maxTwy+1000);
        tr.innerHTML=`<td>${name}</td><td class="${tooLong?'alert-cell':''}">${Math.round(dist).toLocaleString()}</td><td>${t1}</td><td>${t2}</td>`;
        tbody.appendChild(tr);
    });

    if(twys){
        const sep=document.createElement('tr');
        sep.innerHTML=`<td colspan="4" class="twy-header">VACATE DISTANCE (FT)</td>`;
        tbody.appendChild(sep);
        twys.forEach(twy=>{
            const tr=document.createElement('tr');
            const isHi=hiSpdTwy.includes(twy.n);
            const short=twy.d<(ab3d-1000);
            const cls=short?'alert-cell':(isHi?'twy-hi':'twy-norm');
            tr.innerHTML=`<td class="${cls}">${twy.n}</td><td class="${cls}">${twy.d.toLocaleString()}</td><td></td><td></td>`;
            tbody.appendChild(tr);
        });
    }
    saveState();
}

// ============================================================
// 表示更新
// ============================================================
function updateDisplay() {
    document.getElementById('cond-val').innerText=state.cond;
    document.getElementById('brks-val').innerText=["1","2","3","4","MAX AUTO"][state.brksIdx];
    document.getElementById('wind-val').innerText=(state.wind>=0?"H ":"T ")+Math.abs(state.wind);
    document.getElementById('oat-val').innerText=state.oat;
    document.getElementById('qnh-val').innerText=isinHg()?state.qnh.toFixed(2):state.qnh;
    document.getElementById('wgt-val').innerText=(state.wgt/1000).toFixed(0)+"T";
    document.getElementById('vref-val').innerText=state.vref;
    document.getElementById('m788').className=state.model==='787-8'?'active':'';
    document.getElementById('m789').className=state.model==='787-9'?'active':'';
    document.getElementById('f25').className=state.flap===25?'active':'';
    document.getElementById('f30').className=state.flap===30?'active':'';
    calculateAll();
}

function setModel(m){state.model=m;state.wgt=(m==='787-8'?320000:360000);updateDisplay();}
function setFlap(f){state.flap=f;updateDisplay();}
